<!DOCTYPE html>
<html>
    <head>
        <title>Github Profile README.md Generator</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 40px; background-color: #ffffff; color: #000000 }
            .box { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0); }
            input, textarea { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
            textarea { height: 100px; }
            button { background-color: #2da44e; color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
            button:hover { background-color: #237739; }
        </style>
    </head>
    <body>
        
    </body>
    <h1>Github Profile README.md Generator</h1>
    <div class = "box">
        <h3>Your Information</h3>
        <label>Name:</label>
        <input type = "text" id = "username" placeholder = "Your Name">
        <label>About Me / Bio:</label>
        <textarea id = "bio-user" placeholder = "I am learning web development and love open source!"></textarea>
        <label>GitHub Username:</label>
        <input type = "text" id = "github-user" placeholder = "Your Username">
    </div>
</html>
